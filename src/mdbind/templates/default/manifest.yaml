name: smd-default
version: "0.1.0"
description: Default Scrum.md template package for AI-operated Scrum memory.
author: Scrum.md maintainers
template_engine: jinja2
smd_version: "0.1.0"
memory_root: scrum
instructions:
  - scrum/instructions/LLM.md
variables:
  - name: project_name
    prompt: Project name
    default: scrum.md
    required: true
  - name: owner
    prompt: Owner
    default: Guilherme
    required: true
  - name: purpose
    prompt: Purpose
    default: Build and maintain an auditable Scrum memory for AI-assisted development.
    required: true
  - name: language
    prompt: Language
    default: en
    required: true
  - name: memory_root
    prompt: Memory root
    default: scrum
    required: true
  - name: template_profile
    prompt: Template profile
    default: standard
    required: true
files:
  - template: scrum/schema/constitution.schema.yaml
    target: scrum/schema/constitution.schema.yaml
  - template: scrum/schema/backlog.schema.yaml
    target: scrum/schema/backlog.schema.yaml
  - template: scrum/schema/backlog-item.schema.yaml
    target: scrum/schema/backlog-item.schema.yaml
  - template: scrum/schema/sprints.schema.yaml
    target: scrum/schema/sprints.schema.yaml
  - template: scrum/schema/sprint.schema.yaml
    target: scrum/schema/sprint.schema.yaml
  - template: scrum/schema/instructions.schema.yaml
    target: scrum/schema/instructions.schema.yaml
  - template: scrum/CONSTITUTION.md.j2
    target: scrum/CONSTITUTION.md
  - template: scrum/backlog.md.j2
    target: scrum/backlog.md
  - template: scrum/sprints.md.j2
    target: scrum/sprints.md
  - template: scrum/decisions.md.j2
    target: scrum/decisions.md
  - template: scrum/experience.md.j2
    target: scrum/experience.md
  - template: scrum/architecture.md.j2
    target: scrum/architecture.md
compatibility:
  manifest_version: "1"
  signature_policy: checksum-only
entrypoints:
  base_memory:
    - scrum/CONSTITUTION.md
    - scrum/backlog.md
    - scrum/sprints.md
    - scrum/decisions.md
    - scrum/experience.md
    - scrum/architecture.md
tags: [scrum, memory, ai, mdbind, default]
