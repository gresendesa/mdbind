$schema: https://json-schema.org/draft/2020-12/schema
type: object
required:
  - id
  - title
  - status
  - owner
  - created_at
  - updated_at
  - type
  - scope
  - detail_directory
properties:
  id:
    const: backlog
  schema:
    type: string
  title:
    type: string
  status:
    const: active
  owner:
    type: string
  type:
    const: consolidator
  scope:
    const: backlog
  detail_directory:
    type: string
  tags:
    type: array
    items:
      type: string
